name: Uruchom Model V1 (Numerai)

on:
  schedule:
    # Robot uruchomi się sam w każdą środę o 12:00 UTC (13:00 / 14:00 w Niemczech)
    - cron: '0 12 * * 3'
  workflow_dispatch: # Ten wpis pozwala Ci odpalić skrypt ręcznie na żądanie!

jobs:
  build-and-submit:
    runs-on: ubuntu-latest

    steps:
    - name: Pobieranie repozytorium
      uses: actions/checkout@v3

    - name: Instalacja środowiska Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'

    - name: Instalacja bibliotek
      run: |
        python -m pip install --upgrade pip
        pip install numerapi pyarrow pandas lightgbm

    - name: Trening i wysyłka (Model V1)
      env:
        NUMERAI_PUBLIC_ID: ${{ secrets.NUMERAI_PUBLIC_ID }}
        NUMERAI_SECRET_KEY: ${{ secrets.NUMERAI_SECRET_KEY }}
      run: python model_v1.py
